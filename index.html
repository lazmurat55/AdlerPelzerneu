<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG BOCHUM SECURE PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="APG Report">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <style>
        :root { --bg: #000000; --card: #1e293b; --primary: #38bdf8; --blue-dark: #1e40af; --text: #f1f5f9; --danger: #ef4444; --success: #22c55e; }
        body { background: linear-gradient(180deg,#020617,#0f172a); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        #loginScreen, #setPassScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 95%; max-width: 450px; text-align: center; }
        .card { width: 100%; max-width: 700px; background: var(--card); padding: 20px; border-radius: 20px; margin: auto; border: 1px solid rgba(56, 189, 248, 0.3); display: none; }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        
        label { display: block; margin: 15px 0 5px; color: var(--primary); font-weight: bold; font-size: 15px; text-transform: uppercase; }
        select, input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        
        .schicht-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .schicht-btn { padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; font-size: 16px; }
        .schicht-btn.active { background: var(--primary); color: #0f172a; }
        
        #workerOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .overlay-content { background: var(--card); width: 95%; max-width: 450px; max-height: 80vh; overflow-y: auto; border-radius: 20px; padding: 25px; border: 1px solid var(--primary); }
        .worker-opt { padding: 15px; border-bottom: 1px solid #334155; cursor: pointer; font-size: 16px; }
        .selected-worker { display: flex; justify-content: space-between; padding: 14px; background: rgba(56,189,248,0.1); border-radius: 10px; margin-top: 6px; border: 1px solid var(--primary); font-size: 16px; }
        
        .section-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid rgba(56, 189, 248, 0.1); position: relative; }
        .ft-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .ft-btn { padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 15px; }
        .ft-btn.active { background: var(--blue-dark); color: white; border-color: var(--primary); }
        
        .main-btn { width: 100%; padding: 20px; background: var(--primary); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
        .main-btn:disabled { background: #475569; cursor: not-allowed; }
        .add-btn { width: 100%; padding: 12px; margin-top: 10px; background: transparent; border: 2px dashed var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .sub-btn { background: var(--blue-dark); color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; flex: 1; font-weight: bold; }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; margin-top: 8px; }
        .status-ok { background: var(--success); color: black; }
        .status-error { background: var(--danger); color: white; }
        
        .code-row { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px solid #334155; }
        .code-row-inputs { display: flex; gap: 8px; align-items: center; width: 100%; }
        .sonstige-input { width: 100%; margin-top: 4px; display: none; border-color: var(--primary); background: #0f172a; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .dashboard-card { background: #000000; border: 1px solid var(--primary); border-radius: 20px; padding: 25px; width: 100%; max-width: 1400px; margin: auto; display: none; box-sizing: border-box; }
        .reports-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 20px; margin-top: 20px; align-items: start; }
        @media(min-width: 768px) { .reports-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(min-width: 1200px) { .reports-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .report-box { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 18px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); transition: border-color 0.2s; }
        .report-box:hover { border-color: var(--primary); }
        .badge-origin { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; background: var(--blue-dark); color: white; margin-bottom: 8px; }
        .dash-text { font-size: 16px; margin: 6px 0; line-height: 1.6; }
        .dash-sub-text { font-size: 14px; margin: 4px 0; line-height: 1.5; padding-left: 12px; }

        /* Yeni Dashboard Üst Filtre Alanı */
        .dash-filter-section { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-top: 15px; padding: 15px; background: #1e293b; border-radius: 15px; border: 1px solid #334155;}
        .dash-info-badge { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary); padding: 8px 15px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>

        <p style="font-size:14px; color:#94a3b8;">Bitte Nachname und Passwort eingeben</p>

</div>

                <option value="COM">Compound</option>

    </div>
    <div id="ftBox" style="display:none;"><label>Formträger (FT)</label><div class="ft-grid"><button class="ft-btn" onclick="this.classList.toggle('active')">FT1</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT2</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT3</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT4</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT5</button><button class="ft-btn" onclick="this.classList.toggle('active')">FT6</button></div></div>

<div class="dashboard-card" id="adminPanel">
    <div class="header">
        <h1 style="font-size:28px; margin-bottom:5px;">APG Live Dashboard</h1>
        <p id="adminUserDisplay" style="color:var(--primary); font-size:16px; font-weight:bold;"></p>
    </div>

    <div class="dash-filter-section">
        <div id="dashVardiyaButonlari" class="schicht-group" style="margin-bottom:0; max-width:350px; flex:1;">
            <button class="schicht-btn active" id="filterAll" onclick="filterDashboard('ALL')">Alle Schichten</button>
            <button class="schicht-btn" id="filterA" onclick="filterDashboard('A Schicht')">A</button>
            <button class="schicht-btn" id="filterB" onclick="filterDashboard('B Schicht')">B</button>
            <button class="schicht-btn" id="filterC" onclick="filterDashboard('C Schicht')">C</button>
        </div>
        
        <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
            <div class="dash-info-badge">
                Nächste Aktualisierung: <b id="refreshCountdown" style="color:white;">--:--</b>
            </div>
            <button class="main-btn" style="margin-top:0; padding:12px 25px; font-size:15px; width:auto;" onclick="loadAdminDashboard()">🔄 Manuell aktualisieren</button>

        <button class="main-btn" onclick="document.getElementById('workerOverlay').style.display='none'">Schließen</button>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyrah4sOVv7dRfMY62lqW7qfmt7w_P86VWGMjfT38-2T4w7ERKar35uXHLoj2rVJakH/exec";

let currentSchicht = "B";
let currentSchichtType = "Frühschicht";
let selectedStaff = [];
let loggedInUser = "";
let loggedInUserRole = "";
let loggedInUserSchicht = "";
let allFetchedReports = [];
let activeDashboardFilter = "ALL";
let refreshTimerInterval = null;
let countdownSecondsLeft = 0;

const workerData = {
    "A": ["Kunert M.", "Karali O.", "Mikuczynski K.", "Türkmen E.", "Amrouch M.", "Stania D.", "Kantaroglu A.", "Krancioch A.", "Held D.", "Berisha I.", "Neji M.", "Mulugeta G.", "Udezue P.", "Jansen M.", "Aksoy O.", "Yildirim S.", "Brand N.", "Louze A.", "Blanquez Romero V.", "Diallo M.D.", "Sener E.", "Klomrit", "Garcia"],
    "B": ["Keskin Mur.", "Aldirmaz P.", "Anderwald R.", "Bayrakli F.", "Kilic D.", "Maafi T.", "Besche T.", "Eickhoff P.", "Toth Renata", "Gibba n.", "Helf A.", "Isbir J.", "Jeyakumar S.", "Kalisch T.", "Kowarsch R.", "Nowak M.", "Pähler D.", "Patarcsity V.", "Pulendran K.", "Sahin E.", "Savas S.", "Schiavitelli", "Uluyüz B.", "Uzun S.", "Klomrit", "Garcia"],
    "C": ["Beher T.", "Keskin Mustafa", "Kantaroglu Ö.", "Savas R.", "Rafo S.", "Gertz Kevin", "Gertz S.", "Schönborn Ch.", "Fortes Ch.", "Sakaguchi M.", "Mercan M.", "Krämer Ch.", "Juretzka T.", "Kumbara E.", "Skupio D.", "Skrago T.", "Bah A.", "Kaya A.", "Jdea A.", "Toure A.", "Schneider D.", "Tchaleu Bertrand", "Keskinmus", "Klomrit", "Garcia"]

const codeData = {
    PUR: { 
        aus: ["6-2-01 Temperatur zu niedrig", "6-2-02 Schaum haftet nicht am Bauteil", "6-2-03 Einlegefehler", "6-2-04 Schussabbruch", "6-2-05 CIM nicht voll ausgeschäumt", "6-2-06 Lippe gerissen", "6-2-07 CIM gerissen", "7-2-01 Nacharbeit am Bauteil", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-2-01 Ungepl. Inst. WZ", "4-2-02 Ungepl. Inst. Masch", "4-2-03 Poly/Iso Überdruck", "4-2-04 Mischkopf nio", "4-2-05 Fehler Lichtschr.", "4-2-06 Trennmittelpist.", "4-2-07 Formträger Prob.", "4-2-08 Reinigung WZ", "4-2-09 Not Aus", "5-2-01 Logistik Mangel", "5-2-02 Keine Teile IM/CIM", "5-2-04 Wartezeit Einrichter", "5-2-10 Poly/Iso leer", "Sonstige"]
    },
    Spritz: { 
        aus: ["6-1-01 Anfahrschrott", "6-1-02 Mat-Umst.", "6-1-03 CIM n.voll", "6-1-04 CIM gerissen", "6-1-05 Überspritzung", "6-1-06 Einfallstellen", "6-1-07 Brandstellen", "6-1-08 Silberstreifen", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-1-01 Ungepl. Inst. WZ", "4-1-02 Ungepl. Inst. Masch", "4-1-03 Mat-Förderung Prob.", "4-1-04 Probleme Dosier.", "4-1-05 Probleme Schließeinh.", "4-1-06 Teileentnahme Prob.", "4-1-07 Probleme WZ-Heizung", "4-1-08 Probleme Beflamm.", "5-1-01 Mat-Mangel", "5-1-03 Wartezeit Einrichter", "Sonstige"]
    },
    COM: { 
        aus: ["6-3-01 Anfahrschrott", "6-3-02 Mat-Fehler", "Sonstige"],
        stoer: ["3-01 WZ-Wechsel", "3-02 Mat-Umst.", "4-3-01 Messer schleifen", "4-3-02 Ungepl. Inst. Masch", "4-3-04 Silowechsel", "5-3-01 Mat-Mangel", "5-3-05 Feueralarm", "Sonstige"]
    }
};

function setInitialTodayDate() {
    const inputEl = document.getElementById('datum');
    if (inputEl && !inputEl.value) {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        inputEl.value = `${year}-${month}-${day}`;
    }
}

async function checkLogin() {
    const user = document.getElementById("userInp").value.trim();
    const pass = document.getElementById("passInp").value.trim();
    const errorBox = document.getElementById("loginError");
    errorBox.style.display = "none";
    
    if (!user || !pass) {
        errorBox.innerText = "⚠️ Bitte alles eingeben!";
        errorBox.style.display = "block";
        return;
    }
    try {
        const response = await fetch(scriptURL + "?action=login" + "&user=" + encodeURIComponent(user) + "&pass=" + encodeURIComponent(pass));
        const data = await response.json();
        if (!data.success) {
            errorBox.innerText = "⚠️ " + data.message;
            errorBox.style.display = "block";
            return;
        }
        loggedInUser = user;
        loggedInUserRole = data.role;
        loggedInUserSchicht = data.schicht || "B";
        currentSchicht = data.schicht || "B"; 

        document.getElementById("loginScreen").style.display = "none";
        
        // DASHBOARD YÖNETİCİ GİRİŞİ (Admin veya Schichtleiter)
        if (data.role === "Admin" || data.role === "Schichtleiter") {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("adminUserDisplay").innerText = `Angemeldet als: ${user} (${data.role})`;
            
            // Eğer Schichtleiter ise sadece kendi vardiyasını görecek ve üstteki butonlar kısıtlanacak
            if(data.role === "Schichtleiter") {
                activeDashboardFilter = data.schicht + " Schicht";
                document.getElementById("dashVardiyaButonlari").style.display = "none"; // Seçim butonlarını gizle
            } else {
                activeDashboardFilter = "ALL";
                document.getElementById("dashVardiyaButonlari").style.display = "grid"; // Admin ise butonları göster
            }

            loadAdminDashboard();
            startSmartRefreshEngine(); // Akıllı yenileme motorunu başlat
        } else {
            // NORMAL OPERATÖR GİRİŞİ
            document.getElementById("mainApp").style.display = "block";
            document.getElementById("currentUserDisplay").innerText = "Angemeldet als: " + user;
            setInitialTodayDate();
            setSchicht(currentSchicht);
        }
    } catch(e) {
        errorBox.innerText = "⚠️ Server Fehler";
        errorBox.style.display = "block";
    }
}

async function saveNewPassword() {
    const p1 = document.getElementById("newPass1").value.trim();
    const p2 = document.getElementById("newPass2").value.trim();
    if (p1.length < 4) { alert("Passwort mindestens 4 Zeichen!"); return; }
    if (p1 !== p2) { alert("Passwörter stimmen nicht überein!"); return; }
    try {
        await fetch(scriptURL, {
            method: "POST",
            body: JSON.stringify({ action: "savePassword", user: loggedInUser, password: p1 })
        });
        document.getElementById("setPassScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("currentUserDisplay").innerText = "Angemeldet als: " + loggedInUser;
        setInitialTodayDate();
    } catch(e) { alert("Server Fehler!"); }
}

// AKILLI SAYAÇ VE OTOMATİK YENİLEME MOTORU
function startSmartRefreshEngine() {
    if(refreshTimerInterval) clearInterval(refreshTimerInterval);
    
    // Süreyi belirleme fonksiyonu
    function calculateNextInterval() {
        const now = new Date();
        const currentMin = now.getHours() * 60 + now.getMinutes();
        
        // Kritik Zaman Aralıkları (Dakika cinsinden hesaplama)
        // 05:30 - 06:15  =>  330 - 375 dk
        // 13:30 - 14:15  =>  810 - 855 dk
        // 21:30 - 22:15  =>  1290 - 1335 dk
        const isKritikZeit = (currentMin >= 330 && currentMin <= 375) || 
                             (currentMin >= 810 && currentMin <= 855) || 
                             (currentMin >= 1290 && currentMin <= 1335);
                             
        return isKritikZeit ? 90 : 1800; // Kritik zamanlarda 90 saniye, diğer zamanlarda 30 dakika (1800 saniye)
    }

    countdownSecondsLeft = calculateNextInterval();

    refreshTimerInterval = setInterval(() => {
        countdownSecondsLeft--;
        
        if (countdownSecondsLeft <= 0) {
            loadAdminDashboard();
            countdownSecondsLeft = calculateNextInterval(); // Yeni periyodu hesapla
        }
        
        // Ekrana dakikalı geri sayımı basma
        const m = Math.floor(countdownSecondsLeft / 60);
        const s = countdownSecondsLeft % 60;
        document.getElementById("refreshCountdown").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }, 1000);
}

async function loadAdminDashboard() {
    document.getElementById('dashboardLoading').style.display = 'block';
    try {
        const response = await fetch(scriptURL + "?action=getReports");
        const data = await response.json();
        allFetchedReports = data.reports || [];
        document.getElementById('dashboardLoading').style.display = 'none';
        renderDashboardData();
    } catch(e) {
        document.getElementById('reportsContainer').innerHTML = '<p style="text-align:center; color:var(--danger); font-size:16px;">❌ Fehler beim Laden.</p>';
    }
}

function filterDashboard(schichtFilter) {
    activeDashboardFilter = schichtFilter;
    document.querySelectorAll('#dashVardiyaButonlari .schicht-btn').forEach(b => b.classList.remove('active'));
    
    if(schichtFilter === 'ALL') document.getElementById('filterAll').classList.add('active');
    else if(schichtFilter === 'A Schicht') document.getElementById('filterA').classList.add('active');
    else if(schichtFilter === 'B Schicht') document.getElementById('filterB').classList.add('active');
    else if(schichtFilter === 'C Schicht') document.getElementById('filterC').classList.add('active');
    
    renderDashboardData();
}

function renderDashboardData() {
    const container = document.getElementById('reportsContainer');
    
    // Rol ve buton filtresine göre veriyi süzüyoruz
    const filtered = allFetchedReports.filter(r => {
        if (activeDashboardFilter === "ALL") return true;
        return r.origin === activeDashboardFilter;
    });

    if(filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:16px; grid-column: 1 / -1;">Keine Berichte für diese Schicht vorhanden.</p>';
        return;
    }

    container.innerHTML = filtered.map(r => `
        <div class="report-box">
            <span class="badge-origin">${r.origin}</span>
            <div style="display:flex; justify-content:space-between; font-size:14px; color:var(--primary); font-weight:bold; border-bottom:1px solid #334155; padding-bottom:6px; margin-bottom:8px;">
                <span>📅 ${r.date}</span>
                <span>Von: ${r.sender}</span>
            </div>
            <div style="line-height:1.6;">
                <p class="dash-text">Anlage: <b style="color:white;">${r.anlage}</b> ${r.ft !== '-' ? `[FT: ${r.ft}]` : ''}</p>
                <p class="dash-text">Artikelnummer: <b style="color:white;">${r.artikel}</b></p>
                <p class="dash-text" style="color:var(--success);">Gutteile: <b>${r.gut} Stk</b></p>
                <p class="dash-text" style="color:var(--danger);">Ausschuss: <b>${r.ausTotal} Stk</b></p>
                ${r.ausGrund !== '-' ? `<p class="dash-sub-text" style="color:#94a3b8;">↳ ${r.ausGrund} (${r.ausStk} Stk)</p>` : ''}
                ${r.stoerung !== '-' ? `<p class="dash-sub-text" style="color:#f59e0b;">⚙️ ${r.stoerung} (${r.dauer} Min)</p>` : ''}
                <p style="margin-top:10px; font-size:13px; color:#94a3b8; border-top:1px dashed #334155; padding-top:6px;">Team: ${r.staff}</p>
            </div>
        </div>
    `).join('');
}

function setSchicht(s) { 
    currentSchicht = s; 
    document.querySelectorAll('.schicht-group .schicht-btn').forEach(b => { 
        if(!b.classList.contains('type-btn')) b.classList.remove('active'); 
    }); 
    const target = Array.from(document.querySelectorAll('.schicht-group .schicht-btn')).find(b => b.innerText === s && !b.classList.contains('type-btn')); 
    if(target) target.classList.add('active'); 
    selectedStaff=[]; 
    renderStaff(); 
}

function setSchichtType(type) { 
    currentSchichtType = type; 
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active')); 
    if(type.startsWith('Früh')) document.getElementById('sFrueh').classList.add('active');
    else if(type.startsWith('Spät')) document.getElementById('sSpaet').classList.add('active');
    else if(type.startsWith('Nacht')) document.getElementById('sNacht').classList.add('active');
}

function openWorkerOverlay() { 
    document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join(""); 
    document.getElementById('workerOverlay').style.display='flex'; 
}
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); document.getElementById('workerOverlay').style.display='none'; renderStaff(); }
function addManualWorker() { const v = document.getElementById('manualWorker').value; if(v) { selectedStaff.push("✍️ " + v); document.getElementById('manualWorker').value=""; document.getElementById('workerOverlay').style.display='none'; renderStaff(); } }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:red; cursor:pointer;">✕</span></div>`).join(""); liveCheck(); }
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); }

function onAnlageChange(v) { 
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none"; 
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none"; 
    document.getElementById('artikelContainer').innerHTML = ""; 
    document.getElementById('addArtikelBtn').disabled = (v === "");
    liveCheck(); 
}

function addArtikel() {
    const id = Date.now(); 
    const div = document.createElement('div'); 
    div.className = "section-card artikel-row"; 
    div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:red; color:white; border:none; border-radius:5px;">✕</button>
        <label>Artikelnummer</label><input type="text" class="art-name" placeholder="Nummer eingeben...">
        ${document.getElementById('anlage').value==='COM' ? '<label>Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten..." oninput="liveCheck()">' : ''}
        <div class="grid-2" style="margin-top:10px;"><div><label>Gutteile (Stk)</label><input type="number" class="art-gut" placeholder="Anzahl..."></div><div><label>Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Anzahl..." oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div><div id="rows_${id}"></div>
        <div style="display:flex; gap:10px; margin-top:10px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    document.getElementById('artikelContainer').appendChild(div);
    liveCheck();
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value; 
    const cat = anl==='COM'?'COM':(anl.startsWith("PUR")?'PUR':'Spritz');
    const div = document.createElement('div'); 
    div.className="code-row";
    div.innerHTML = `<div class="code-row-inputs"><select class="${type}-c" style="flex:3;" onchange="this.parentElement.nextElementSibling.style.display=(this.value==='Sonstige'?'block':'none')">
        ${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}</select><input type="number" class="${type}-v" style="flex:1; min-width:80px;" placeholder="${type==='aus'?'Stk':'Min'}" oninput="liveCheck()">
        <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="color:red; background:none; border:none; font-weight:bold; font-size:16px; padding:0 5px;">✕</button></div><input type="text" class="sonstige-input" placeholder="Grund manuell...">`;
    document.getElementById(`rows_${artId}`).appendChild(div);
    liveCheck();
}

function liveCheck() {
    let isValid = true; 
    let compoundTotalTime = 0;
    const anlage = document.getElementById('anlage').value;
    const rows = document.querySelectorAll('.artikel-row');

    rows.forEach(row => {
        const id = row.id.split('_')[1]; 
        const totalAusInput = parseInt(row.querySelector('.art-aus-total').value) || 0;
        let detailsAusSum = 0; 
        
        row.querySelectorAll('.aus-v').forEach(input => detailsAusSum += parseInt(input.value) || 0);
        if(anlage === 'COM') {
            const dur = parseInt(row.querySelector('.art-duration').value) || 0;
            compoundTotalTime += dur;
        }

        const badge = document.getElementById(`badge_${id}`);
        if(totalAusInput !== detailsAusSum) {
            badge.innerText = `⚠️ Ausschuss-Summe stimmt nicht! (Eingegeben: ${totalAusInput}, Details: ${detailsAusSum})`;
            badge.className = "status-badge status-error";
            isValid = false;
        } else {
            badge.innerText = "✓ Datenstruktur OK";
            badge.className = "status-badge status-ok";
        }
    });

    if(anlage === 'COM') {
        document.getElementById('comTotal').innerText = compoundTotalTime;
    }
    document.getElementById('mainSendBtn').disabled = !isValid || rows.length === 0 || selectedStaff.length === 0;
    return isValid;
}

async function processReport() {
    if(!liveCheck()) { 
        alert("Bitte korrigieren Sie die Fehler vor dem Senden!"); 
        return; 
    }
    
    const sendBtn = document.getElementById('mainSendBtn');
    sendBtn.disabled = true;
    sendBtn.innerText = "⏳ SENDEN...";

    const anlage = document.getElementById('anlage').value;
    const datum = document.getElementById('datum').value;
    
    let selectedFTs = [];
    document.querySelectorAll('.ft-btn.active').forEach(b => selectedFTs.push(b.innerText));
    const ftValue = selectedFTs.length > 0 ? selectedFTs.join(", ") : "-";

    if (!currentSchicht) currentSchicht = "B";

    const payload = {
        action: "sendReport",
        schicht: currentSchicht,
        schichtType: currentSchichtType,
        customDate: datum,
        sender: loggedInUser,
        staff: selectedStaff.length > 0 ? selectedStaff.join(", ") : "-",
        anlage: anlage,
        ft: ftValue,
        articles: []
    };

    document.querySelectorAll('.artikel-row').forEach(row => {
        const artName = row.querySelector('.art-name').value || "-";
        const gutTeile = row.querySelector('.art-gut').value || "0";
        const ausTotal = row.querySelector('.art-aus-total').value || "0";

        let ausGruende = [];
        let ausStks = [];
        row.querySelectorAll('.code-row').forEach(cr => {
            const selectEl = cr.querySelector('.aus-c');
            if(selectEl) {
                let val = selectEl.value;
                if(val === 'Sonstige') val = cr.querySelector('.sonstige-input').value || 'Sonstige';
                const stk = cr.querySelector('.aus-v').value || "0";
                ausGruende.push(val);
                ausStks.push(stk);
            }
        });

        let stoerGruende = [];
        let stoerMinuten = [];
        row.querySelectorAll('.code-row').forEach(cr => {
            const selectEl = cr.querySelector('.stoer-c');
            if(selectEl) {
                let val = selectEl.value;
                if(val === 'Sonstige') val = cr.querySelector('.sonstige-input').value || 'Sonstige';
                const min = cr.querySelector('.stoer-v').value || "0";
                stoerGruende.push(val);
                stoerMinuten.push(min);
            }
        });

        payload.articles.push({
            name: artName,
            gut: gutTeile,
            ausTotal: ausTotal,
            ausDetailsGrund: ausGruende.length > 0 ? ausGruende.join(" | ") : "-",
            ausDetailsStk: ausStks.length > 0 ? ausStks.join(" | ") : "-",
            stoerDetailsReason: stoerGruende.length > 0 ? stoerGruende.join(" | ") : "-",
            stoerDetailsMin: stoerMinuten.length > 0 ? stoerMinuten.join(" | ") : "-"
        });
    });

    try {
        const response = await fetch(scriptURL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(payload)
        });
        
        const resData = await response.json();
        
        if(resData.success) {
            alert("🚀 Rapor başarıyla kaydedildi!");
            document.getElementById('artikelContainer').innerHTML = "";
            selectedStaff = [];
            renderStaff();
            document.getElementById('anlage').value = "";
            onAnlageChange("");
        } else {
            alert("❌ Fehler: " + resData.message);
        }
    } catch(e) {
        alert("❌ Server Bağlantı Hatası!");
        console.error(e);
    } finally {
        sendBtn.disabled = false;
        sendBtn.innerText = "🚀 SPEICHERN & SENDEN";
    }
}
</script>
</body>
</html>
