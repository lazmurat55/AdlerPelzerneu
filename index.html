function formatGermanDateString(rawDateStr) {
    if(!rawDateStr) return "-";
    let str = String(rawDateStr);
    const monthsEng = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const monthsGer = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];
    for(let i=0; i<12; i++) {
        if(str.includes(monthsEng[i])) {
            str = str.replace(monthsEng[i], monthsGer[i]);
            break;
        }
    }
    return str;
}

// SAYFA YÜKLENDİĞİ AN BUGÜNÜN TARİHİNİ ATAYAN KESİN METOT
function setInitialTodayDate() {

    const inputEl = document.getElementById('datum');

    if (inputEl && !inputEl.value) {

        const today = new Date();

        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');

        inputEl.value = `${year}-${month}-${day}`;
    }
}

async function checkLogin() {

    const user =
        document.getElementById("userInp")
        .value.trim();

    const pass =
        document.getElementById("passInp")
        .value.trim();

    const errorBox =
        document.getElementById("loginError");

    errorBox.style.display = "none";

    if (!user || !pass) {

        errorBox.innerText =
            "⚠️ Bitte alles eingeben!";

        errorBox.style.display = "block";

        return;
    }

    try {

        const response = await fetch(

            scriptURL +

            "?action=login" +

            "&user=" +
            encodeURIComponent(user) +

            "&pass=" +
            encodeURIComponent(pass)

        );

        const data =
            await response.json();

        if (!data.success) {

            errorBox.innerText =
                "⚠️ " + data.message;

            errorBox.style.display =
                "block";

            return;
        }

        loggedInUser = user;

        document.getElementById(
            "loginScreen"
        ).style.display = "none";

        // İlk giriş
        if (data.firstLogin) {

            document.getElementById(
                "setPassScreen"
            ).style.display = "flex";

            return;
        }

        // Admin / Schichtleiter
        if (
            data.role === "Admin" ||
            data.role === "Schichtleiter"
        ) {

            document.getElementById(
                "adminPanel"
            ).style.display = "block";

            document.getElementById(
                "adminUserDisplay"
            ).innerText =
                "Angemeldet als: " + user;

            loadAdminDashboard();

        } else {

            document.getElementById(
                "mainApp"
            ).style.display = "block";

            document.getElementById(
                "currentUserDisplay"
            ).innerText =
                "Angemeldet als: " + user;

            setInitialTodayDate();
        }

    } catch(e) {

        errorBox.innerText =
            "⚠️ Server Fehler";

        errorBox.style.display =
            "block";

        console.log(e);
    }
}

async function saveNewPassword() {

    const p1 =
        document.getElementById("newPass1")
        .value.trim();

    const p2 =
        document.getElementById("newPass2")
        .value.trim();

    if (p1.length < 4) {

        alert(
            "Passwort mindestens 4 Zeichen!"
        );

        return;
    }

    if (p1 !== p2) {

        alert(
            "Passwörter stimmen nicht überein!"
        );

        return;
    }

    try {

        await fetch(scriptURL, {

            method: "POST",

            body: JSON.stringify({

                action: "savePassword",

                user: loggedInUser,

                password: p1

            })

        });

        document.getElementById(
            "setPassScreen"
        ).style.display = "none";

        document.getElementById(
            "mainApp"
        ).style.display = "block";

        document.getElementById(
            "currentUserDisplay"
        ).innerText =
            "Angemeldet als: " +
            loggedInUser;

        setInitialTodayDate();

    } catch(e) {

        alert(
            "Server Fehler!"
        );
    }
}

        if(u === "Keskin") {
            document.getElementById('rightsManagementBox').style.display = 'block';
            document.getElementById('currentManagersList').innerText = "Berechtigte Manager: " + superManagersList.join(', ');
        }
        loadAdminDashboard();
    } else {
        document.getElementById('mainApp').style.display='block'; 
        document.getElementById('currentUserDisplay').innerText = "Angemeldet: " + u; 
        
        let foundSchicht = "B";
        if(workerData["A"].includes(u)) foundSchicht = "A";
        if(workerData["C"].includes(u)) foundSchicht = "C";
        
        setSchicht(foundSchicht); 
    }
}

async function grantSuperManagerRights() {
    const name = document.getElementById('rightsSelect').value;
    if(!superManagersList.includes(name)) {
        superManagersList.push(name);
        document.getElementById('currentManagersList').innerText = "Berechtigte Manager: " + superManagersList.join(', ');
        try {
            await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "updateRights", managers: superManagersList }) });
            alert(name + " wurde als Super-Manager aktiviert!");
        } catch(e) {}
    }
}

async function loadAdminDashboard() {
    const container = document.getElementById('reportsContainer');
    const scrollPos = window.scrollY;
    
    document.getElementById('dashboardLoading').style.display = container.innerHTML === "" ? 'block' : 'none';
    try {
        const response = await fetch(scriptURL + "?action=getReports");
        const data = await response.json();
        const reports = data.reports.sort((a, b) => {

    const dateA = new Date(
        (a.customDate || a.date).split(".").reverse().join("-")
    );

    const dateB = new Date(
        (b.customDate || b.date).split(".").reverse().join("-")
    );

    return dateB - dateA;
});
        document.getElementById('dashboardLoading').style.display = 'none';
        
        if(!reports || reports.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#94a3b8; font-size:16px;">Keine Berichte vorhanden.</p>';
            return;
        }

        container.innerHTML = reports.map(r => {
            let germanFormattedDate = formatGermanDateString(r.date);
            if (r.customDate) {
    germanFormattedDate = r.customDate;
}
            return `
                <div class="report-box">
                    <span class="badge-origin">${r.origin}</span>
                    <div style="display:flex; justify-content:space-between; font-size:16px; color:var(--primary); font-weight:bold; border-bottom:1px solid #334155; padding-bottom:6px; margin-bottom:8px;">
                        <span>📅 ${germanFormattedDate}</span>
                        <span>Gesendet von: ${r.sender}</span>
                    </div>
                    <div style="margin-top:8px; line-height:1.6;">
                        <p class="dash-text">Schicht: <b style="color:var(--primary); font-size:17px;">${r.schicht || '-'}</b></p>
                        <p class="dash-text">Anlage: <b style="color:white; font-size:17px;">${r.anlage}</b> ${r.ft !== '-' ? `<span style="color:var(--primary); font-size:15px;">[FT: ${r.ft}]</span>` : ''}</p>
                        <p class="dash-text">Artikelnummer: <b style="color:white; font-size:17px;">${r.artikel}</b></p>
                        <p class="dash-text" style="color:var(--success);">Gutteile (Stk): <b style="font-size:18px;">${r.gut}</b></p>
                        <p class="dash-text" style="color:var(--danger);">Ausschuss Gesamt (Stk): <b style="font-size:18px;">${r.ausTotal}</b></p>
                        ${r.ausGrund !== '-' ? `<p class="dash-sub-text" style="color:#94a3b8;">↳ Grund: ${r.ausGrund} | Stk: ${r.ausStk}</p>` : ''}
                        ${r.stoerung !== '-' ? `<p class="dash-sub-text" style="color:#f59e0b;">⚙️ Störung: ${r.stoerung} | Min: ${r.dauer}</p>` : ''}
                        <p style="margin:12px 0 0 0; font-size:15px; color:#ffffff; border-top:1px dashed #334155; padding-top:6px; font-weight:bold;">Document Team: ${r.staff}</p>
                    </div>
                </div>
            `;
        }).join('');

        window.scrollTo(0, scrollPos);

    } catch(e) {
        container.innerHTML = '<p style="text-align:center; color:var(--danger); font-size:16px;">❌ Fehler beim Laden.</p>';
    }
}

function setSchicht(s) { 
    currentSchicht = s; 
    document.querySelectorAll('.schicht-group .schicht-btn').forEach(b => { 
        if(!b.classList.contains('type-btn')) b.classList.remove('active'); 
    }); 
    const target = Array.from(document.querySelectorAll('.schicht-group .schicht-btn')).find(b => b.innerText === s && !b.classList.contains('type-btn')); 
    if(target) target.classList.add('active'); 
    selectedStaff=[]; 
    renderStaff(); 
    
    if (s === "A") setSchichtType('Frühschicht');
    else if (s === "B") setSchichtType('Spätschicht');
    else if (s === "C") setSchichtType('Nachtschicht');
}

// BUTON KİLİTLERİNİ TAMAMEN KIRAN YENİ GELİŞTİRİLMİŞ ATAMA SİHRİ
function setSchichtType(type) { 
    currentSchichtType = type; 
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active')); 
    if(type === 'Frühschicht' || type === 'Früh') {
        const el = document.getElementById('sFrueh');
        if(el) el.classList.add('active');
    } else if(type === 'Spätschicht' || type === 'Spät') {
        const el = document.getElementById('sSpaet');
        if(el) el.classList.add('active');
    } else if(type === 'Nachtschicht' || type === 'Nacht') {
        const el = document.getElementById('sNacht');
        if(el) el.classList.add('active');
    }
}

function openWorkerOverlay() { document.getElementById('workerList').innerHTML = workerData[currentSchicht].map(w => `<div class="worker-opt" onclick="addStaff('${w}')">${w}</div>`).join(""); document.getElementById('workerOverlay').style.display='flex'; }
function addStaff(n) { if(!selectedStaff.includes(n)) selectedStaff.push(n); document.getElementById('workerOverlay').style.display='none'; renderStaff(); }
function addManualWorker() { const v = document.getElementById('manualWorker').value; if(v) { selectedStaff.push("✍️ " + v); document.getElementById('manualWorker').value=""; document.getElementById('workerOverlay').style.display='none'; renderStaff(); } }
function renderStaff() { document.getElementById('workerDisplayContainer').innerHTML = selectedStaff.map(s => `<div class="selected-worker"><span>${s}</span><span onclick="removeStaff('${s}')" style="color:red; cursor:pointer;">✕</span></div>`).join(""); liveCheck(); }
function removeStaff(n) { selectedStaff = selectedStaff.filter(x => x !== n); renderStaff(); }

function onAnlageChange(v) { 
    document.getElementById('ftBox').style.display = v.startsWith("PUR") ? "block" : "none"; 
    document.getElementById('comTimeBox').style.display = v === "COM" ? "block" : "none"; 
    document.getElementById('artikelContainer').innerHTML = ""; 
    
    const btn = document.getElementById('addArtikelBtn');
    if (v !== "") {
        btn.disabled = false;
    } else {
        btn.disabled = true;
    }
    liveCheck(); 
}

function addArtikel() {
    const id = Date.now(); const div = document.createElement('div'); div.className = "section-card artikel-row"; div.id = `art_${id}`;
    div.innerHTML = `<button onclick="this.parentElement.remove(); liveCheck();" style="position:absolute; right:10px; top:10px; background:red; color:white; border:none; border-radius:5px;">✕</button>
        <label>Artikelnummer</label><input type="text" class="art-name" placeholder="Nummer eingeben...">
        ${document.getElementById('anlage').value==='COM' ? '<label>Dauer (Min)</label><input type="number" class="art-duration" placeholder="Minuten..." oninput="liveCheck()">' : ''}
        <div class="grid-2" style="margin-top:10px;"><div><label>Gutteile (Stk)</label><input type="number" class="art-gut" placeholder="Anzahl..."></div><div><label>Aus Gesamt</label><input type="number" class="art-aus-total" placeholder="Anzahl..." oninput="liveCheck()"></div></div>
        <div class="status-badge" id="badge_${id}"></div><div id="rows_${id}"></div>
        <div style="display:flex; gap:10px; margin-top:10px;"><button class="sub-btn" onclick="addRow('${id}','aus')">+ Ausschuss</button><button class="sub-btn" onclick="addRow('${id}','stoer')">+ Störung</button></div>`;
    document.getElementById('artikelContainer').appendChild(div);
}

function addRow(artId, type) {
    const anl = document.getElementById('anlage').value; const cat = anl==='COM'?'COM':(anl.startsWith("PUR")?'PUR':'Spritz');
    const div = document.createElement('div'); div.className="code-row";
    div.innerHTML = `<div class="code-row-inputs"><select class="${type}-c" style="flex:3;" onchange="this.parentElement.nextElementSibling.style.display=(this.value==='Sonstige'?'block':'none')">
        ${codeData[cat][type].map(c => `<option value="${c}">${c}</option>`).join("")}</select><input type="number" class="${type}-v" style="flex:1; min-width:80px;" placeholder="${type==='aus'?'Stk':'Min'}" oninput="liveCheck()">
        <button onclick="this.parentElement.parentElement.remove(); liveCheck();" style="color:red; background:none; border:none; font-weight:bold; font-size:16px; padding:0 5px;">✕</button></div><input type="text" class="sonstige-input" placeholder="Grund manuell...">`;
    document.getElementById(`rows_${artId}`).appendChild(div);
}

function liveCheck() {
    let v = true; let cT = 0;
    document.querySelectorAll('.artikel-row').forEach(row => {
        const id = row.id.split('_')[1]; const t = parseInt(row.querySelector('.art-aus-total').value) || 0;
        let s = 0; row.querySelectorAll('.aus-v').forEach(i => s += parseInt(i.value) || 0);
        const b = document.getElementById('badge_' + id);
        if(t > 0 && t !== s) { b.className="status-badge status-error"; b.innerText = "⚠️ Differenz: " + s + "/" + t; v=false; }
        else if(t > 0) { b.className="status-badge status-ok"; b.innerText = "✅ OK: " + s + "/" + t; } else { b.innerText=""; }
        if(document.getElementById('anlage').value==='COM') cT += parseInt(row.querySelector('.art-duration')?.value) || 0;
    });
    if(document.getElementById('anlage').value==='COM') { document.getElementById('comTotal').innerText = cT; if(cT !== 480) v = false; }
    if(selectedStaff.length === 0 || !document.getElementById('anlage').value) v = false;
    document.getElementById('mainSendBtn').disabled = !v;
}



function filterReports(schicht, event){

    const boxes = document.querySelectorAll('.report-box');

    boxes.forEach(box => {

        const badge = box.querySelector('.badge-origin');

        const txt = badge ? badge.innerText.trim() : '';

        if(schicht === 'ALLE'){

            box.style.display = 'block';

        }else if(txt === schicht + ' Schicht'){

            box.style.display = 'block';

        }else{

            box.style.display = 'none';
        }
    });

    document.querySelectorAll('.live-filter').forEach(btn => {

        btn.style.background = '#1e293b';
        btn.style.color = 'white';

    });

    if(event){

        event.target.style.background = '#38bdf8';
        event.target.style.color = '#0f172a';

    }
}




async function processReport() {
    const btn = document.getElementById('mainSendBtn'); btn.innerText = "Sende..."; btn.disabled = true;
    const fts = Array.from(document.querySelectorAll('.ft-btn.active')).map(x => x.innerText).join(", ");
    
    const rawDate = document.getElementById('datum').value;
    let formattedReportDate = "";
    if(rawDate) {
        const parts = rawDate.split("-");
        if(parts.length === 3) formattedReportDate = parts[2] + "." + parts[1] + "." + parts[0];
    }

    let articlesArray = [];

    document.querySelectorAll('.artikel-row').forEach(row => {
        let artName = row.querySelector('.art-name').value || "NA";
        let artGut = row.querySelector('.art-gut').value || 0;
        let artAusTotal = row.querySelector('.art-aus-total').value || 0;
        
        let ausDetailsGrund = "-";
        let ausDetailsStk = 0;
        let stoerDetailsReason = "-";
        let stoerDetailsMin = 0;

        row.querySelectorAll('.code-row').forEach(cr => {
            const val = cr.querySelector('input[type="number"]').value;
            if(val > 0) {
                let n = cr.querySelector('select').value;
                if(n === "Sonstige") n = "✍️ " + (cr.querySelector('.sonstige-input').value || "Sonstige");
                
                if (cr.querySelector('select').classList.contains('aus-c')) {
                    ausDetailsGrund = n;
                    ausDetailsStk = Number(val);
                } else {
                    stoerDetailsReason = n;
                    stoerDetailsMin = Number(val);
                }
            }
        });

        articlesArray.push({
            name: artName,
            gut: artGut,
            ausTotal: artAusTotal,
            ausDetailsGrund: ausDetailsGrund,
            ausDetailsStk: ausDetailsStk,
            stoerDetailsReason: stoerDetailsReason,
            stoerDetailsMin: stoerDetailsMin
        });
    });

    const payload = {
        action: "sendReport",
        sender: loggedInUser,
        staff: selectedStaff.join(", "),
        anlage: document.getElementById('anlage').value,
        schicht: currentSchicht, 
        schichtType: currentSchichtType, 
        customDate: formattedReportDate, 
        ft: fts || "-",
        articles: articlesArray
    };

    try { 
        await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        alert("Vielen Dank! Der Bericht wurde erfolgreich übermittelt. ✅");
        window.location.reload();
    } catch(e) { 
        alert("Vielen Dank! Der Bericht wurde erfolgreich übermittelt. ✅");
        window.location.reload();
    }
}
</script>
